name: 定时爬取世界杯数据

on:
  schedule:
    # 每4小时运行一次 (UTC时间)
    - cron: '0 */4 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    paths:
      - 'crawler/**'   # 爬虫代码变更时触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许推送数据文件

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: crawler/requirements.txt

      - name: 安装依赖
        run: pip install -r crawler/requirements.txt

      - name: 运行爬虫
        run: python crawler/main.py

      - name: 检查数据变更
        id: check_changes
        run: |
          if git diff --quiet public/data/matches.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "数据无变化，跳过提交"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "检测到新数据"
          fi

      - name: 提交并推送数据更新
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/matches.json
          git commit -m "📊 自动更新比赛数据 [$(date +'%Y-%m-%d %H:%M UTC')]"
          git push
